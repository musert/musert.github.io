<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .box { fill: #ffffff; stroke: #1e293b; stroke-width: 2.2; }
      .enc { fill: #eef2ff; stroke: #334155; stroke-width: 2.2; }
      .fusion { fill: #dcfce7; stroke: #166534; stroke-width: 2.3; }
      .score { fill: #f1f5f9; stroke: #334155; stroke-width: 2.2; }
      .text { font-family: Arial, Helvetica, sans-serif; font-size: 34px; fill: #0f172a; text-anchor: middle; dominant-baseline: middle; }
      .sub { font-family: Arial, Helvetica, sans-serif; font-size: 25px; fill: #334155; text-anchor: middle; dominant-baseline: middle; }
      .math { font-family: Georgia, 'Times New Roman', serif; font-size: 31px; fill: #0f172a; text-anchor: middle; dominant-baseline: middle; font-style: italic; }
      .arrow { stroke: #475569; stroke-width: 2.8; fill: none; marker-end: url(#arrowhead); }
      .wave { stroke: #2563eb; stroke-width: 5; fill: none; stroke-linecap: round; }
      .captionIcon { stroke: #2563eb; stroke-width: 4; fill: none; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto">
      <polygon points="0 0, 12 4.5, 0 9" fill="#475569"/>
    </marker>
    <filter id="softShadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <rect class="box" x="110" y="60" width="470" height="108" rx="20"/>
    <rect class="box" x="1020" y="60" width="470" height="108" rx="20"/>

    <rect class="enc" x="70" y="235" width="550" height="108" rx="20"/>
    <rect class="enc" x="980" y="235" width="550" height="108" rx="20"/>

    <rect class="enc" x="160" y="410" width="370" height="100" rx="18"/>
    <rect class="enc" x="1070" y="410" width="370" height="100" rx="18"/>

    <rect class="fusion" x="140" y="575" width="1320" height="98" rx="18"/>
    <rect class="fusion" x="260" y="725" width="1080" height="82" rx="18"/>
    <rect class="score" x="310" y="842" width="980" height="52" rx="16"/>
  </g>

  <path class="wave" d="M160 114 C175 83,185 145,200 114 C215 83,225 145,240 114 C255 83,265 145,280 114" />
  <text class="text" x="365" y="100">Audio waveform</text>
  <text class="math" x="365" y="140">aᵢ</text>

  <g transform="translate(1075,88)">
    <rect class="captionIcon" x="0" y="0" width="62" height="48" rx="7"/>
    <line class="captionIcon" x1="13" y1="15" x2="49" y2="15"/>
    <line class="captionIcon" x1="13" y1="30" x2="44" y2="30"/>
  </g>
  <text class="text" x="1270" y="100">Caption</text>
  <text class="math" x="1270" y="140">cᵢ</text>

  <text class="text" x="345" y="270">Audio encoder</text>
  <text class="sub" x="345" y="310">VGGish / PANNs (CNN14) / Mel</text>

  <text class="text" x="1255" y="270">Text encoder</text>
  <text class="sub" x="1255" y="310">RoBERTa / BERTurk</text>

  <text class="text" x="345" y="445">Audio embedding</text>
  <text class="math" x="345" y="482">xᵢ⁽ᵃ⁾</text>

  <text class="text" x="1255" y="445">Text embedding</text>
  <text class="math" x="1255" y="482">xᵢ⁽ᵗ⁾</text>

  <text class="text" x="800" y="610">MMTAT Fusion Transformer</text>
  <text class="sub" x="800" y="644">Modality-specific or modality-agnostic self-attention</text>

  <text class="text" x="800" y="755">Joint representations</text>
  <text class="math" x="800" y="787">hᵢ⁽ᵃ⁾, hᵢ⁽ᵗ⁾</text>

  <text class="text" x="800" y="869" style="font-size:29px;">Cosine similarity &amp; retrieval scores (R@K, mAP@K)</text>

  <path class="arrow" d="M345 168 V235"/>
  <path class="arrow" d="M1270 168 V235"/>
  <path class="arrow" d="M345 343 V410"/>
  <path class="arrow" d="M1270 343 V410"/>
  <path class="arrow" d="M345 510 V575"/>
  <path class="arrow" d="M1270 510 V575"/>
  <path class="arrow" d="M800 673 V725"/>
  <path class="arrow" d="M800 807 V842"/>
</svg>
